<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reforma Templo Jurumê</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --v:#8B1A1A;--v-md:#B22222;--v-lt:#FAE8E8;
  --a:#8A6800;--a-md:#C49A00;--a-lt:#FBF4DC;
  --r:#3B0D52;--r-md:#5C1A80;--r-lt:#F0E6F7;--r-dk:#1E0630;
  --bg:#F5F2ED;--white:#FDFAF5;--muted:#6B6560;
  --border:rgba(59,13,82,0.12);--text:#1A0A22;
  --radius:14px;--sw:256px;
}
body{font-family:"Open Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:16px;line-height:1.6;}
.hdr{background:var(--r-dk);height:66px;display:flex;align-items:center;padding:0 2rem 0 calc(var(--sw)+2rem);justify-content:space-between;border-bottom:2px solid var(--a-md);position:sticky;top:0;z-index:300;flex-shrink:0;}
.hdr-title{font-family:"Merriweather",serif;font-size:18px;font-weight:700;color:var(--a-md);}
.hdr-sub{font-size:12px;color:rgba(251,244,220,0.45);margin-top:2px;}
.app{display:flex;flex:1;min-height:0;}
.sb{width:var(--sw);flex-shrink:0;background:var(--r-dk);border-right:1px solid rgba(196,154,0,0.18);position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto;display:flex;flex-direction:column;}
.sb::-webkit-scrollbar{width:4px;}.sb::-webkit-scrollbar-thumb{background:rgba(196,154,0,0.2);border-radius:99px;}
.sb-logo{padding:1.5rem 1rem 1rem;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid rgba(196,154,0,0.12);}
.sb-img{width:80px;height:80px;border-radius:50%;border:2px solid var(--a-md);object-fit:cover;margin-bottom:10px;}
.sb-name{font-family:"Merriweather",serif;font-size:15px;font-weight:700;color:var(--a-md);text-align:center;line-height:1.3;}
.sb-sub{font-size:11px;color:rgba(196,154,0,0.45);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;text-align:center;}
.sb-sec{padding:1rem 1.25rem 0.4rem;font-size:11px;font-weight:700;color:rgba(196,154,0,0.4);letter-spacing:0.12em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 1.5rem;cursor:pointer;font-size:15px;color:rgba(253,250,245,0.45);transition:all 0.15s;border-left:3px solid transparent;font-weight:400;user-select:none;}
.nav-item i{font-size:18px;flex-shrink:0;}
.nav-item:hover{color:rgba(253,250,245,0.8);background:rgba(255,255,255,0.03);}
.nav-item.active{color:var(--a-md);border-left-color:var(--a-md);background:rgba(196,154,0,0.07);font-weight:600;}
.sb-div{border:none;border-top:1px solid rgba(196,154,0,0.1);margin:0.5rem 0;}
.setor-btn{display:flex;align-items:center;gap:8px;padding:7px 1.25rem;cursor:pointer;font-size:13px;color:rgba(253,250,245,0.35);transition:all 0.15s;width:100%;background:none;border:none;text-align:left;font-family:"Open Sans",sans-serif;user-select:none;}
.setor-btn:hover{color:rgba(253,250,245,0.7);}
.setor-btn.ativo{color:rgba(255,160,160,0.9);font-weight:600;}
.setor-btn.selecionado{color:var(--a-md);background:rgba(196,154,0,0.06);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.12);}
.sdot-rf{background:var(--v-md);}.sdot-sel{background:var(--a-md);}
.sb-bottom{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(196,154,0,0.1);}
.admin-link{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(253,250,245,0.25);cursor:pointer;font-family:"Open Sans",sans-serif;background:none;border:none;width:100%;padding:6px 0;transition:color 0.15s;}
.admin-link:hover{color:rgba(253,250,245,0.5);}
.admin-link.on{color:rgba(255,160,160,0.7);}
.content{flex:1;min-width:0;}
.hero{background:var(--r-dk);padding:2rem 2.5rem;border-bottom:3px solid var(--a-md);}
.hero-inner{display:flex;align-items:center;justify-content:space-between;gap:2rem;}
.hero-text{flex:1;min-width:0;}
.hero-foto-desktop{flex-shrink:0;width:220px;height:160px;border-radius:12px;overflow:hidden;border:2px solid rgba(196,154,0,0.3);background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;}
.hero-foto-desktop img{width:100%;height:100%;object-fit:cover;}
.hero-foto-desktop.empty{display:none;}
.hero-foto-mobile{display:none;}
.hero-foto-mobile img{width:100%;border-radius:10px;border:2px solid rgba(196,154,0,0.3);margin-bottom:1rem;object-fit:cover;max-height:180px;}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(178,34,34,0.18);border:1px solid rgba(178,34,34,0.35);border-radius:99px;padding:5px 14px;font-size:13px;color:#FFB0B0;font-weight:600;margin-bottom:12px;}
.hero-tag-breve{display:none;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:99px;padding:5px 14px;font-size:13px;color:rgba(253,250,245,0.45);font-weight:600;margin-bottom:12px;}
.hero-dot{width:7px;height:7px;border-radius:50%;background:var(--v-md);}
.hero-title{font-family:"Merriweather",serif;font-size:28px;font-weight:700;color:var(--white);margin-bottom:6px;}
.hero-sub{font-size:14px;color:rgba(253,250,245,0.45);margin-bottom:1.5rem;}
.prog-lbl{font-size:12px;color:var(--a-md);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;font-weight:700;}
.prog-bg{width:100%;max-width:420px;height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--v-md),var(--a-md));border-radius:99px;transition:width 0.5s;}
.prog-nums{display:flex;justify-content:space-between;max-width:420px;margin-top:8px;}
.prog-nums span{font-size:13px;color:rgba(253,250,245,0.4);}.prog-nums strong{font-size:13px;color:var(--white);font-weight:700;}
.main{max-width:960px;padding:2rem 2.5rem;}
.view{display:none;}.view.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:2rem;}
.mc{background:var(--white);border-radius:var(--radius);padding:1.25rem 1.5rem;border:1px solid var(--border);position:relative;overflow:hidden;}
.mc.dest::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--v-md),var(--a-md));}
.mc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;}
.ic-v{background:var(--v-lt);color:var(--v);}.ic-a{background:var(--a-lt);color:var(--a);}.ic-r{background:var(--r-lt);color:var(--r-md);}
.mc-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;}
.mc-value{font-size:26px;font-weight:700;color:var(--text);line-height:1;}.mc-sub{font-size:13px;color:var(--muted);margin-top:5px;}
.panel{background:var(--white);border-radius:var(--radius);padding:1.75rem;border:1px solid var(--border);}
.sec-title{font-family:"Merriweather",serif;font-size:17px;font-weight:700;color:var(--r);margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;}
.sec-title i{color:var(--a-md);font-size:20px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;}
.cbar{margin-bottom:16px;}.cbar-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.cbar-lbl{font-size:14px;color:var(--text);font-weight:500;}.cbar-val{font-size:13px;color:var(--muted);}
.bar-bg{background:var(--bg);border-radius:99px;height:6px;overflow:hidden;}.bar-fill{height:100%;border-radius:99px;}
.tl{display:flex;flex-direction:column;}.tl-item{display:flex;gap:14px;padding-bottom:20px;}.tl-item:last-child{padding-bottom:0;}
.tl-l{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid;}
.t-done{background:var(--v-lt);color:var(--v);border-color:var(--v);}.t-act{background:var(--a-lt);color:var(--a);border-color:var(--a-md);}.t-todo{background:var(--white);color:var(--muted);border-color:rgba(107,101,96,0.25);}
.tl-line{width:2px;flex:1;background:var(--border);margin:4px 0;}.tl-r{padding-top:4px;}
.tl-phase{font-size:15px;font-weight:600;color:var(--text);}.tl-desc{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.5;}
.dl{display:flex;flex-direction:column;gap:10px;}
.di{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:10px;}
.dav{width:38px;height:38px;border-radius:50%;background:var(--r-lt);color:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.dinfo{flex:1;}.dnome{font-size:14px;font-weight:600;color:var(--text);}.ddata{font-size:12px;color:var(--muted);margin-top:2px;}.dval{font-size:15px;font-weight:700;color:var(--v);}
.ml{display:flex;flex-direction:column;gap:8px;}
.mi{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;border:1px solid var(--border);gap:12px;background:var(--white);}
.mnome{font-size:14px;color:var(--text);font-weight:600;}.mqtd{font-size:12px;color:var(--muted);margin-top:2px;}
.badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;letter-spacing:0.04em;text-transform:uppercase;flex-shrink:0;}
.b-ok{background:rgba(59,109,17,0.12);color:#2D5A0A;}.b-low{background:var(--a-lt);color:var(--a);}.b-end{background:var(--v-lt);color:var(--v);}
.ftabs{display:flex;gap:8px;margin-bottom:1.25rem;}
.ftab{font-size:14px;font-weight:600;padding:8px 20px;border-radius:99px;cursor:pointer;border:1.5px solid;transition:all 0.15s;font-family:"Open Sans",sans-serif;background:var(--white);color:var(--muted);border-color:var(--border);}
.ftab.fa{background:var(--r-lt);color:var(--v);border-color:var(--v-md);}.ftab.fd{background:var(--a-lt);color:var(--a);border-color:var(--a-md);}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1rem;}
.fcard{aspect-ratio:4/3;border-radius:10px;overflow:hidden;position:relative;background:var(--bg);cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted);transition:border-color 0.15s;}
.fcard:hover{border-color:var(--a-md);}.fcard i{font-size:28px;color:var(--a-md);opacity:0.5;}.fcard span{font-size:12px;}
.fcard img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.fcard-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(30,6,48,0.75);color:var(--white);font-size:12px;font-weight:600;padding:7px 10px;}
.fadd{border:2px dashed rgba(154,116,0,0.35);background:var(--a-lt);}.fadd i{opacity:1;}.fadd span{color:var(--a);font-weight:600;font-size:13px;}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
.ccard{aspect-ratio:3/4;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer;transition:border-color 0.15s;padding:1rem;position:relative;overflow:hidden;}
.ccard:hover{border-color:var(--r-md);}
.ccard img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.ccard-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(30,6,48,0.82);padding:8px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.ccard i{font-size:30px;color:var(--r-md);opacity:0.5;}
.ccard-tipo{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:3px 10px;border-radius:99px;}
.ct-doc{background:var(--v-lt);color:var(--v);}.ct-nf{background:var(--r-lt);color:var(--r-md);}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;}
.tbtn{background:var(--white);border:1.5px solid var(--border);color:var(--muted);font-family:"Open Sans",sans-serif;font-size:14px;font-weight:600;padding:7px 18px;border-radius:99px;cursor:pointer;transition:all 0.15s;}
.tbtn.active{background:var(--r);color:var(--white);border-color:var(--r);}
.scards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:2rem;}
.scard{background:var(--white);border-radius:var(--radius);padding:1.25rem;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.scard:hover{border-color:var(--r-md);}.scard.ativo::after{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--v-md),var(--a-md));}
.scard-nome{font-family:"Merriweather",serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.scard-st{font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:6px;}.scard-info{font-size:13px;color:var(--muted);}
.notice{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:2.5rem;text-align:center;color:var(--muted);font-size:14px;margin-bottom:1.5rem;}
.notice i{font-size:40px;color:rgba(196,154,0,0.3);display:block;margin-bottom:12px;}
.notice strong{display:block;font-size:18px;font-weight:700;color:var(--r);margin-bottom:6px;font-family:"Merriweather",serif;}
.divider{border:none;border-top:1px solid var(--border);margin:1.75rem 0;}
/* ADMIN */
.apanel{background:var(--white);border-radius:var(--radius);padding:1.75rem;border:1px solid rgba(139,26,26,0.12);margin-bottom:1.5rem;}
.aform{display:flex;flex-direction:column;gap:14px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:6px;}
.fl{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.03em;text-transform:uppercase;}
.fi,.fsel{font-family:"Open Sans",sans-serif;font-size:15px;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);background:var(--white);outline:none;transition:border-color 0.15s;}
.fi:focus,.fsel:focus{border-color:var(--r-md);}
.fta{min-height:80px;resize:vertical;}
.sbtn{background:var(--r);color:var(--white);border:none;font-family:"Open Sans",sans-serif;font-size:14px;font-weight:700;padding:11px 26px;border-radius:10px;cursor:pointer;transition:opacity 0.15s;align-self:flex-start;}
.sbtn:hover{opacity:0.85;}
.del-btn{background:none;border:1px solid var(--v-md);color:var(--v-md);font-family:"Open Sans",sans-serif;font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.del-btn:hover{background:var(--v-lt);}
/* lista admin inline */
.alist{display:flex;flex-direction:column;gap:8px;margin-top:1rem;}
.alist-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);}
.alist-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--border);}
.alist-info{flex:1;min-width:0;}
.alist-nome{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.alist-sub{font-size:11px;color:var(--muted);margin-top:2px;}
/* preview upload */
.img-preview{width:100%;max-height:180px;object-fit:contain;border-radius:8px;border:1px solid var(--border);margin-top:8px;display:none;}
/* pub */
.pub-box{background:linear-gradient(135deg,rgba(139,26,26,0.06),rgba(196,154,0,0.06));border:1.5px solid rgba(196,154,0,0.25);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;}
.pub-box h3{font-family:"Merriweather",serif;font-size:17px;font-weight:700;color:var(--r);margin-bottom:4px;}
.pub-box p{font-size:13px;color:var(--muted);line-height:1.6;}
.pub-btn{background:linear-gradient(135deg,var(--v-md),var(--a-md));color:#fff;border:none;font-family:"Open Sans",sans-serif;font-size:14px;font-weight:700;padding:12px 24px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;transition:opacity 0.15s;}
.pub-btn:hover{opacity:0.85;}.pub-btn i{font-size:18px;}
/* login */
.lov{position:fixed;inset:0;background:rgba(20,5,30,0.92);display:flex;align-items:center;justify-content:center;z-index:999;}
.lbox{background:var(--white);border-radius:var(--radius);padding:2.5rem;width:360px;border:1px solid rgba(196,154,0,0.25);}
.llogo{display:flex;justify-content:center;margin-bottom:1.5rem;}
.llogo img{width:80px;height:80px;border-radius:50%;border:3px solid var(--a-md);object-fit:cover;}
.ltitle{font-family:"Merriweather",serif;font-size:20px;color:var(--r);text-align:center;margin-bottom:4px;font-weight:700;}
.lsub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:1.5rem;}
.lerr{font-size:14px;color:var(--v-md);text-align:center;margin-top:8px;display:none;font-weight:600;}
.lbtn{width:100%;background:var(--r);color:var(--white);border:none;font-family:"Open Sans",sans-serif;font-size:15px;font-weight:700;padding:13px;border-radius:10px;cursor:pointer;margin-top:12px;transition:opacity 0.15s;}
.lbtn:hover{opacity:0.85;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--r-dk);color:var(--white);font-size:14px;font-weight:600;padding:12px 22px;border-radius:10px;border:1px solid rgba(196,154,0,0.3);z-index:9999;opacity:1;transition:opacity 0.4s;}
.hidden{display:none!important;}

.mob-menu-btn{display:none;}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:399;}
.mob-overlay.open{display:block;}



/* ══ MOBILE ══ */
@media(max-width:768px){
  :root{--sw:0px;}
  .hdr{padding:0 1rem;height:58px;}
  .hdr-title{font-size:15px;}
  .hdr-sub{display:none;}
  .sb{position:fixed;left:-280px;top:0;bottom:0;width:275px;height:100vh;z-index:400;transition:left .28s ease;overflow-y:auto;}
  .sb.open{left:0;}
  .content{flex:1;margin-left:0;}
  .hero{padding:1.25rem 1rem 1.5rem;}
  .hero-inner{flex-direction:column;gap:0;}
  .hero-foto-desktop{display:none!important;}
  .hero-foto-mobile{display:block;}
  .hero-foto-mobile img{width:100%;max-height:200px;object-fit:cover;border-radius:10px;border:2px solid rgba(196,154,0,0.35);margin-bottom:1.25rem;}
  .hero-title{font-size:22px;}
  .hero-sub{font-size:13px;margin-bottom:.75rem;}
  .main{padding:1rem;}
  .grid2{grid-template-columns:1fr;gap:1rem;}
  .metrics{grid-template-columns:1fr 1fr;gap:10px;}
  .mc{padding:1rem;}
  .mc-value{font-size:20px;}
  .fgrid{grid-template-columns:1fr 1fr;}
  .cgrid{grid-template-columns:1fr 1fr;}
  .scards{grid-template-columns:1fr 1fr;}
  .frow{grid-template-columns:1fr;}
  .pub-box{flex-direction:column;gap:1rem;}
  .pub-box .pub-btn{width:100%;justify-content:center;}
  .panel{padding:1.25rem;}
  .apanel{padding:1.25rem;}
  .sec-title{font-size:15px;}
  .lbox{width:calc(100vw - 2rem);padding:1.75rem 1.25rem;}
}
@media(max-width:400px){
  .metrics{grid-template-columns:1fr;}
  .fgrid{grid-template-columns:1fr;}
  .cgrid{grid-template-columns:1fr;}
  .scards{grid-template-columns:1fr;}
}
</style>
